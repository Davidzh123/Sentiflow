version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sentiflow:sentiflow@db:5432/sentiflow
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend
      - ./services:/app/services
      - ./features:/app/features

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app/frontend

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.app.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://sentiflow:sentiflow@db:5432/sentiflow
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app/backend
      - ./services:/app/services

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=sentiflow
      - POSTGRES_PASSWORD=sentiflow
      - POSTGRES_DB=sentiflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
